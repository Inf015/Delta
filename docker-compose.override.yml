# Override para desarrollo en Mac — NO subir al servidor
# Este archivo se aplica automáticamente sobre docker-compose.yml

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app          # hot reload: monta el código fuente
      - csvdata:/data/csvs
      - pdfdata:/data/pdfs
      - kbdata:/data/knowledge_base
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    volumes:
      - ./backend:/app          # mismo código que api
      - csvdata:/data/csvs
      - pdfdata:/data/pdfs
      - kbdata:/data/knowledge_base
    command: celery -A app.core.celery_app worker --loglevel=debug --concurrency=1

  frontend:
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      API_URL: http://api:8000                    # server-side (Docker network)
      NEXT_PUBLIC_API_URL: http://localhost:8000  # client-side (browser)
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"

  db:
    ports:
      - "5433:5432"             # 5433 en Mac → 5432 en container (evita conflicto con postgres local)

  redis:
    ports:
      - "6379:6379"

  # nginx solo en prod — ver docker-compose.yml profiles: [prod]
